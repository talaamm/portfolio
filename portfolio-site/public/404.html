<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=./index.html">
  </head>
  <body>
    <p>Redirecting...</p>
    <script>
      (function () {
        var l = window.location;
        var segments = l.pathname.split('/').filter(Boolean);

        // Expecting path like /<repo>/<path...>
        var repo = segments[0] || '';
        var pathAfterRepo = segments.slice(1).join('/');

        var base = repo ? '/' + repo + '/' : '/';
        var redirect = base + 'index.html';

        // Pass path as query so the SPA can show the right tab and clean URL
        if (pathAfterRepo) {
          redirect += '?redirect=' + encodeURIComponent('/' + pathAfterRepo);
        }

        redirect += (pathAfterRepo ? '' : l.search) + l.hash;
        l.replace(redirect);
      })();
    </script>
  </body>
</html>
